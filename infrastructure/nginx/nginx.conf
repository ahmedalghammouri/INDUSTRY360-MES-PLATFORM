user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # CORS: echo back the origin for localhost AND private LAN ranges (10/8,
    # 172.16/12, 192.168/16) so phones/tablets on the factory network can reach
    # the API by IP. Anything else → empty (blocked).
    map $http_origin $cors_origin {
        default          "";
        "~^https?://(localhost|127\.0\.0\.1)(:\d+)?$"                     $http_origin;
        "~^https?://10\.\d{1,3}\.\d{1,3}\.\d{1,3}(:\d+)?$"               $http_origin;
        "~^https?://192\.168\.\d{1,3}\.\d{1,3}(:\d+)?$"                  $http_origin;
        "~^https?://172\.(1[6-9]|2[0-9]|3[01])\.\d{1,3}\.\d{1,3}(:\d+)?$" $http_origin;
        "http://web:3000"  $http_origin;
    }

    # Upstream
    upstream api_backend {
        least_conn;
        server api:3001;
        keepalive 32;
    }

    upstream web_frontend {
        server web:4000;
        keepalive 16;
    }

    include /etc/nginx/conf.d/*.conf;
}
