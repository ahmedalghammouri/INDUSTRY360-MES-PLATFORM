server {
    listen 80;
    server_name _;

    # ── API (including OPTIONS preflight) ─────────────────────────
    #
    # CORS is handled entirely here so it works even when the backend
    # is temporarily unreachable (returns 502/504 with no CORS headers).
    #
    location /api/ {
        # ── Preflight: return 204 immediately, no backend needed ──
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'      $cors_origin  always;
            add_header 'Access-Control-Allow-Credentials' 'true'         always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, X-Tenant-ID, X-Request-ID' always;
            add_header 'Access-Control-Max-Age'           '86400'        always;
            add_header 'Content-Length'                   '0';
            return 204;
        }

        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Origin            $http_origin;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_read_timeout    300s;
        proxy_connect_timeout  75s;

        # Strip upstream CORS headers so nginx doesn't duplicate them
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';

        # Force CORS headers onto every response (200, 4xx, 5xx) so the browser
        # can always read the body rather than showing a opaque CORS error.
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Expose-Headers'    'X-Total-Count, X-Page, X-Per-Page' always;

        # Security
        add_header X-Content-Type-Options 'nosniff' always;
        add_header X-Request-ID           $request_id always;
    }

    # ── Auth login — stricter rate limit ─────────────────────────
    location = /api/v1/auth/login {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'      $cors_origin  always;
            add_header 'Access-Control-Allow-Credentials' 'true'         always;
            add_header 'Access-Control-Allow-Methods'     'POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type' always;
            add_header 'Access-Control-Max-Age'           '86400'        always;
            add_header 'Content-Length'                   '0';
            return 204;
        }

        limit_req zone=auth burst=5 nodelay;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   Origin          $http_origin;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
    }

    # ── WebSocket / Socket.IO ─────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      "upgrade";
        proxy_set_header   Host            $host;
        proxy_set_header   Origin          $http_origin;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
    }

    # ── Frontend (Next.js) ───────────────────────────────────────
    location / {
        proxy_pass         http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      'upgrade';
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        add_header X-Frame-Options        "SAMEORIGIN"                  always;
        add_header X-Content-Type-Options "nosniff"                     always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }

    # ── Health ───────────────────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"healthy","service":"industry360-mes"}';
    }
}
