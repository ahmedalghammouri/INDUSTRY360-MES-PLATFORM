# ════════════════════════════════════════════════════════════════
# STAR-MES — Grafana dashboard provisioning
# One provider per category so the Grafana folder gets a clean
# Title-case name while the source tree stays lowercase.
# Dashboards are reloaded from disk every 10s and survive container
# recreation (they live in source control, mounted read-only).
# ════════════════════════════════════════════════════════════════
apiVersion: 1

providers:
  - name: Production
    orgId: 1
    folder: Production
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/production
      foldersFromFilesStructure: false

  - name: Manufacturing
    orgId: 1
    folder: Manufacturing
    type: file
    disableDeletion: false
