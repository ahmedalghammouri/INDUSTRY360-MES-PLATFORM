# ════════════════════════════════════════════════════════════════
# STAR-MES — Grafana contact points
# A webhook back into the STAR-MES notifications API is the primary
# channel so MES alerts surface inside the platform notification feed.
#
# NOTE: values are literal — Grafana alerting provisioning validates the
# webhook URL at boot and does NOT support shell-style ${VAR:-default}.
# Edit these for a different environment.
# ════════════════════════════════════════════════════════════════
apiVersion: 1

contactPoints:
  - orgId: 1
    name: STAR-MES Notifications
    receivers:
      - uid: starmes_webhook
        type: webhook
        settings:
          url: http://api:4001/api/v1/notifications/grafana-webhook
          httpMethod: POST
        disableResolveMessage: false

  - orgId: 1
    name: Plant Email
    receivers:
      - uid: plant_email
        type: email
        settings:
          addresses: ops@star-mes.sa
          singleEmail: false
        disableResolveMessage: false
