# ════════════════════════════════════════════════════════════════
# STAR-MES — Grafana notification policy tree
# Routes MES alerts to the STAR-MES notification webhook, with
# critical severities additionally grouped for faster delivery.
# ════════════════════════════════════════════════════════════════
apiVersion: 1

policies:
  - orgId: 1
    receiver: STAR-MES Notifications
    group_by: ['alertname', 'factory', 'machine']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: Plant Email
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
        continue: true
