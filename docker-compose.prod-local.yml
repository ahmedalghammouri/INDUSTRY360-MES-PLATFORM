# ============================================================
# STAR-MES — PRODUCTION build on LOCAL Docker
# ------------------------------------------------------------
# Builds the API + Web as PRODUCTION images locally (code baked in,
# NO source bind-mounts, NO dev server) and seeds ONLY master/init
# data on first boot:
#   users · factories · areas/lines/machines · shifts · SKUs ·
#   raw materials · spare parts · product master data · UOM ·
#   cycle times · downtime tree · dashboard catalog
# NO production / manufacturing demo data (work orders, production
# orders, inspections, NCR/CAPA, SPC, sensor history).
#
# Distinct project name + container names + volumes from the dev
# stack, but the SAME host ports — so stop the dev stack first:
#
#   docker compose down
#   docker compose -f docker-compose.prod-local.yml up -d --build
#
# Open:  http://localhost:8080
# Login: admin@star-mes.sa / Password@123
# ============================================================

name: star-mes-prodlocal

networks:
  mes-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  influxdb-data:
  minio-data:
  nginx-certs:
  grafana-data:

services:
  # ============================================================
  # DATABASES
  # ============================================================

  postgres:
    image: postgres:16-alpine
    container_name: mes-postgres-plocal
    restart: unless-stopped
    environment:
      POSTGRES_DB: star_mes
      POSTGRES_USER: mes_user
      POSTGRES_PASSWORD: mes_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - mes-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mes_user -d star_mes"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mes-redis-plocal
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - mes-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    container_name: mes-influxdb-plocal
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: starmes_admin
      DOCKER_INFLUXDB_INIT_ORG: star-mes
      DOCKER_INFLUXDB_INIT_BUCKET: mes_timeseries
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: mes-influx-super-secret-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    networks:
      - mes-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MESSAGING
  # ============================================================

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mes-mqtt-broker-plocal
    restart: unless-stopped
    volumes:
      - ./infrastructure/docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
      - "9002:9001"
    networks:
      - mes-network

  # ============================================================
  # STORAGE
  # ============================================================

  minio:
    image: minio/minio:latest
    container_name: mes-minio-plocal
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - mes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============================================================
  # ONE-SHOT: schema push + master-data seed (runs once, then exits)
  #   - prisma db push: create/sync all tables
  #   - prod-init.js: seed master data ONLY if the DB is empty
  #     (so re-running `up` never wipes data you entered)
  # ============================================================

  migrate-seed:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    image: star-mes-api:prodlocal
    container_name: mes-migrate-seed-plocal
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://mes_user:mes_password@postgres:5432/star_mes?schema=public
    networks:
      - mes-network
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "node node_modules/.bin/prisma db push --skip-generate --accept-data-loss &&
             node prisma/prod-init.js"

  # ============================================================
  # APPLICATIONS
  # ============================================================

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    image: star-mes-api:prodlocal
    container_name: mes-api-plocal
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: "3001"
      API_PREFIX: /api/v1
      DATABASE_URL: postgresql://mes_user:mes_password@postgres:5432/star_mes?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: mes-influx-super-secret-token
      INFLUX_ORG: star-mes
      INFLUX_BUCKET: mes_timeseries
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: star-mes
      JWT_SECRET: star-mes-jwt-secret-key-change-in-production-32charss
      JWT_REFRESH_SECRET: star-mes-refresh-secret-key-change-in-prod-32chars
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGINS: http://localhost:8080
    ports:
      - "3001:3001"
    networks:
      - mes-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-seed:
        condition: service_completed_successfully

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
      args:
        # NEXT_PUBLIC_* are baked at build time for Next standalone output.
        # The browser reaches the API through nginx on :8080.
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_WS_URL: ws://localhost:8080
    image: star-mes-web:prodlocal
    container_name: mes-web-plocal
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Next standalone server.js honours PORT/HOSTNAME; nginx upstream is web:4000.
      PORT: "4000"
      HOSTNAME: "0.0.0.0"
    networks:
      - mes-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================
  # REVERSE PROXY — public entry point → http://localhost:8080
  # ============================================================

  nginx:
    image: nginx:alpine
    container_name: mes-nginx-plocal
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-certs:/etc/nginx/certs
    ports:
      - "8080:80"
      - "8443:443"
    networks:
      - mes-network
    depends_on:
      - api
      - web

  # ============================================================
  # MONITORING
  # ============================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: mes-prometheus-plocal
    restart: unless-stopped
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - mes-network

  grafana:
    image: grafana/grafana:latest
    container_name: mes-grafana-plocal
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: starmes
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: "lax"
      GF_USERS_DEFAULT_THEME: "dark"
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: "5s"
      GF_PLUGINS_PREINSTALL: "redis-datasource,marcusolsson-treemap-panel"
      MES_PG_HOST: postgres
      MES_PG_PORT: "5432"
      MES_PG_DB: star_mes
      MES_PG_USER: mes_user
      MES_PG_PASSWORD: mes_password
      MES_INFLUX_URL: http://influxdb:8086
      MES_INFLUX_ORG: star-mes
      MES_INFLUX_BUCKET: mes_timeseries
      MES_INFLUX_TOKEN: mes-influx-super-secret-token
      MES_PROM_URL: http://prometheus:9090
      MES_ALERT_WEBHOOK: http://api:3001/api/v1/notifications/grafana-webhook
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3003:3000"
    networks:
      - mes-network
    depends_on:
      - prometheus
      - postgres
      - influxdb
