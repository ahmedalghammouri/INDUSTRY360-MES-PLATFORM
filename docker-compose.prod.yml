# ============================================================
# STAR-MES — PRODUCTION compose
# ------------------------------------------------------------
# Runs the PRE-BUILT images from Docker Hub (no source mounts,
# no dev server). Env var names match the running app exactly
# (see apps/api/src/config/configuration.ts).
#
# Build & push the images (Docker Build Cloud) with:
#   docker buildx build -f apps/api/Dockerfile --target production \
#     -t gemyalghammouri678/star-mes-api:latest --push apps/api
#   docker buildx build -f apps/web/Dockerfile --target production \
#     -t gemyalghammouri678/star-mes-web:latest --push apps/web
#
# Run on the server:   docker compose -f docker-compose.prod.yml up -d
# Override secrets via a sibling `.env` (same keys as ${...} below).
# ============================================================

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mes-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-star_mes}
      POSTGRES_USER: ${POSTGRES_USER:-mes_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mes-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mes_user} -d ${POSTGRES_DB:-star_mes}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mes-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - mes-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    container_name: mes-influxdb-prod
    restart: always
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-star-mes}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-mes_timeseries}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - mes-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mes-mqtt-prod
    restart: always
    volumes:
      - ./infrastructure/docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - mes-network

  minio:
    image: minio/minio:latest
    container_name: mes-minio-prod
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - mes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  api:
    image: ${DOCKER_NS:-gemyalghammouri678}/star-mes-api:${TAG:-latest}
    container_name: mes-api-prod
    restart: always
    environment:
      NODE_ENV: production
      API_PORT: "3001"
      API_PREFIX: /api/v1
      DATABASE_URL: postgresql://${POSTGRES_USER:-mes_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-star_mes}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-star-mes}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-mes_timeseries}
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: star-mes
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    # Production image CMD is `node dist/main.js`; sync the Prisma schema first.
    command: >
      sh -c "node node_modules/.bin/prisma db push --accept-data-loss &&
             node dist/main.js"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mes-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M

  web:
    image: ${DOCKER_NS:-gemyalghammouri678}/star-mes-web:${TAG:-latest}
    container_name: mes-web-prod
    restart: always
    environment:
      NODE_ENV: production
      # Browser talks to the API same-origin via nginx; these only affect SSR fetches.
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-http://localhost}
      NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://localhost}
      NEXT_PUBLIC_APP_URL: ${PUBLIC_URL:-http://localhost}
    depends_on:
      - api
    networks:
      - mes-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: mes-nginx-prod
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - api
      - web
    networks:
      - mes-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  influxdb_data:
    driver: local
  minio_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_log:
    driver: local
  nginx_cache:
    driver: local

networks:
  mes-network:
    driver: bridge
