version: '3.9'

name: star-mes

networks:
  mes-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  influxdb-data:
  minio-data:
  nginx-certs:

services:
  # ============================================================
  # DATABASES
  # ============================================================

  postgres:
    image: postgres:16-alpine
    container_name: mes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: star_mes
      POSTGRES_USER: mes_user
      POSTGRES_PASSWORD: mes_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - mes-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mes_user -d star_mes"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mes-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - mes-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    container_name: mes-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: starmes_admin
      DOCKER_INFLUXDB_INIT_ORG: star-mes
      DOCKER_INFLUXDB_INIT_BUCKET: mes_timeseries
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: mes-influx-super-secret-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    networks:
      - mes-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MESSAGING
  # ============================================================

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mes-mqtt-broker
    restart: unless-stopped
    volumes:
      - ./infrastructure/docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
      - "9002:9001"
    networks:
      - mes-network

  # ============================================================
  # STORAGE
  # ============================================================

  minio:
    image: minio/minio:latest
    container_name: mes-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - mes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============================================================
  # APPLICATIONS
  # ============================================================

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: mes-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      API_PORT: 3001
      DATABASE_URL: postgresql://mes_user:mes_password@postgres:5432/star_mes?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: mes-influx-super-secret-token
      INFLUX_ORG: star-mes
      INFLUX_BUCKET: mes_timeseries
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: star-mes
      JWT_SECRET: star-mes-jwt-secret-key-change-in-production-32charss
      JWT_REFRESH_SECRET: star-mes-refresh-secret-key-change-in-prod-32chars
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGINS: http://localhost:3000,http://localhost:8080,http://web:3000
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - ./apps/api/logs:/app/logs
    ports:
      - "3001:3001"
    networks:
      - mes-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --accept-data-loss &&
             (npx prisma db seed 2>/dev/null || true) &&
             pnpm start:dev"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: mes-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
      NEXT_PUBLIC_APP_URL: http://localhost:8080
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:4000"
    networks:
      - mes-network
    depends_on:
      - api

  # ============================================================
  # REVERSE PROXY
  # ============================================================

  nginx:
    image: nginx:alpine
    container_name: mes-nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-certs:/etc/nginx/certs
    ports:
      - "8080:80"
      - "8443:443"
    networks:
      - mes-network
    depends_on:
      - api
      - web

  # ============================================================
  # MONITORING
  # ============================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: mes-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - mes-network

  grafana:
    image: grafana/grafana:latest
    container_name: mes-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: starmes
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3003:3000"
    networks:
      - mes-network
    depends_on:
      - prometheus
